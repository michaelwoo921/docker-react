language: generic
sudo: required
services:
  - docker

before_install:
  - docker build -t dockerjw20/docker-react -f Dockerfile.dev ./

script:
  - docker run -e CI=true dockerjw20/docker-react npm run test

deploy:
  provider: elasticbeanstalk
  region: "us-west-1"
  app: "docker-react"
  env: "DockerReact-env"
  bucket_name: "elasticbeanstalk-us-west-1-957374566417"
  path: "docker-react"
  on:
    branch: master
  
access_key_id: $AWS_ACCESS_KEY
secret_access_key: $AWS_SECRET_KEY




